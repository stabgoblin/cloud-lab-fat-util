<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Linear Regression Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #18181f;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #a8ff3e;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  header {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .title-block h1 {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 96px);
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--text);
  }

  .title-block h1 span {
    color: var(--accent);
    display: block;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .badge {
    margin-left: auto;
    background: var(--accent3);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 14px;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
  }

  .panel-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .input-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  textarea, input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus, input:focus {
    border-color: var(--accent);
  }

  textarea { min-height: 90px; }

  .hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover {
    background: #00c4db;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    margin-top: 10px;
  }

  .btn-secondary:hover {
    background: var(--accent2);
    color: #fff;
  }

  .btn:active { transform: scale(0.98); }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }

  .stats-grid.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent3);
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 20px;
    font-family: var(--font-display);
    letter-spacing: 1px;
    color: var(--accent3);
  }

  .equation-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    padding: 16px 20px;
    font-size: 14px;
    color: var(--accent);
    margin-top: 16px;
    display: none;
    font-family: var(--font-mono);
  }

  .predict-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .predict-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .predict-row .input-group {
    flex: 1;
    margin-bottom: 0;
  }

  .predict-row .btn {
    width: auto;
    padding: 12px 20px;
    white-space: nowrap;
  }

  .prediction-result {
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-left: 4px solid var(--accent2);
    padding: 14px 18px;
    display: none;
  }

  .prediction-result .pred-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .prediction-result .pred-value {
    font-size: 28px;
    font-family: var(--font-display);
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .chart-panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px;
  }

  .chart-wrapper {
    position: relative;
    height: 380px;
  }

  .error-msg {
    background: rgba(255,77,109,0.1);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 12px 16px;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }

  .corner-tag {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 9px;
    color: var(--border);
    letter-spacing: 2px;
  }

  /* Animated scan line */
  .scan {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 4s linear infinite;
    opacity: 0.3;
    z-index: 999;
    pointer-events: none;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100vh; }
  }

  .loader {
    display: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-top: 10px;
    overflow: hidden;
    position: relative;
  }

  .loader::after {
    content: '';
    position: absolute;
    top: 0; left: -50%;
    width: 50%;
    height: 100%;
    background: var(--accent);
    animation: load 0.8s ease infinite;
  }

  @keyframes load {
    0% { left: -50%; }
    100% { left: 150%; }
  }
</style>
</head>
<body>
<div class="scan"></div>

<div class="container">
  <header>
    <div class="title-block">
      <h1>LINEAR<span>REGRESSION</span></h1>
      <p class="subtitle">Machine Learning Prediction Engine</p>
    </div>
    <span class="badge">ML Lab v1.0</span>
  </header>

  <div class="grid">
    <!-- Left Panel -->
    <div>
      <div class="panel">
        <div class="panel-label">Training Data</div>

        <div class="input-group">
          <label>X Values (Independent Variable)</label>
          <textarea id="xValues" placeholder="1, 2, 3, 4, 5, 6, 7, 8"></textarea>
          <p class="hint">Enter comma or newline separated numbers</p>
        </div>

        <div class="input-group">
          <label>Y Values (Target Variable)</label>
          <textarea id="yValues" placeholder="2.1, 3.9, 6.2, 7.8, 10.1, 12.3, 14.0, 15.9"></textarea>
          <p class="hint">Must match the count of X values</p>
        </div>

        <div class="loader" id="loader"></div>
        <div class="error-msg" id="errorMsg"></div>

        <button class="btn btn-primary" onclick="trainModel()">▶ TRAIN MODEL</button>

        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-label">Slope (m)</div>
            <div class="stat-value" id="slope">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Intercept (b)</div>
            <div class="stat-value" id="intercept">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">R² Score</div>
            <div class="stat-value" id="r2">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">RMSE</div>
            <div class="stat-value" id="rmse">—</div>
          </div>
        </div>

        <div class="equation-box" id="equationBox"></div>

        <div class="predict-section" id="predictSection">
          <div class="panel-label">Prediction</div>
          <div class="predict-row">
            <div class="input-group">
              <label>X Input</label>
              <input type="number" id="xInput" placeholder="e.g. 9.5" step="any"/>
            </div>
            <button class="btn btn-secondary" onclick="predict()">PREDICT</button>
          </div>
          <div class="prediction-result" id="predResult">
            <div class="pred-label">Predicted Y</div>
            <div class="pred-value" id="predValue">—</div>
          </div>
        </div>

        <span class="corner-tag">SKLEARN · FLASK</span>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="chart-panel">
      <div class="panel-label">Regression Plot</div>
      <div class="chart-wrapper">
        <canvas id="regressionChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
let chart = null;

function parseValues(str) {
  return str.split(/[\s,\n]+/).filter(s => s.trim() !== '').map(Number);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'block' : 'none';
}

async function trainModel() {
  const xRaw = document.getElementById('xValues').value;
  const yRaw = document.getElementById('yValues').value;

  if (!xRaw.trim() || !yRaw.trim()) {
    showError('Please provide both X and Y values.');
    return;
  }

  const xValues = parseValues(xRaw);
  const yValues = parseValues(yRaw);

  setLoading(true);

  try {
    const res = await fetch('/train', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x_values: xValues, y_values: yValues })
    });

    const data = await res.json();
    setLoading(false);

    if (!res.ok) {
      showError(data.error || 'Training failed.');
      return;
    }

    // Update stats
    document.getElementById('slope').textContent = data.stats.slope;
    document.getElementById('intercept').textContent = data.stats.intercept;
    document.getElementById('r2').textContent = data.stats.r2;
    document.getElementById('rmse').textContent = data.stats.rmse;

    document.getElementById('statsGrid').classList.add('visible');

    const eq = document.getElementById('equationBox');
    eq.textContent = `ŷ = ${data.stats.slope}·x + (${data.stats.intercept})`;
    eq.style.display = 'block';

    document.getElementById('predictSection').style.display = 'block';

    // Draw chart
    drawChart(data.scatter, data.line);

  } catch (err) {
    setLoading(false);
    showError('Server error. Make sure the Flask server is running.');
  }
}

async function predict() {
  const xInput = document.getElementById('xInput').value;
  if (xInput === '') {
    showError('Please enter an X value to predict.');
    return;
  }

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x_input: parseFloat(xInput) })
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Prediction failed.');
      return;
    }

    document.getElementById('predValue').textContent = data.prediction;
    document.getElementById('predResult').style.display = 'block';

  } catch (err) {
    showError('Prediction request failed.');
  }
}

function drawChart(scatter, line) {
  const ctx = document.getElementById('regressionChart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: 'Data Points',
          data: scatter.x.map((x, i) => ({ x, y: scatter.y[i] })),
          backgroundColor: 'rgba(168,255,62,0.8)',
          borderColor: '#a8ff3e',
          pointRadius: 7,
          pointHoverRadius: 9,
          pointBorderWidth: 0,
        },
        {
          label: 'Regression Line',
          data: line.x.map((x, i) => ({ x, y: line.y[i] })),
          type: 'line',
          borderColor: '#00e5ff',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeOutQuart' },
      plugins: {
        legend: {
          labels: {
            color: '#6b6b80',
            font: { family: "'Space Mono', monospace", size: 11 },
            boxWidth: 14
          }
        },
        tooltip: {
          backgroundColor: '#111118',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          titleColor: '#00e5ff',
          bodyColor: '#e8e8f0',
          titleFont: { family: "'Space Mono', monospace", size: 11 },
          bodyFont: { family: "'Space Mono', monospace", size: 11 },
          callbacks: {
            label: ctx => `(${ctx.parsed.x.toFixed(3)}, ${ctx.parsed.y.toFixed(3)})`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#6b6b80', font: { family: "'Space Mono', monospace", size: 10 } },
          border: { color: '#2a2a3a' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#6b6b80', font: { family: "'Space Mono', monospace", size: 10 } },
          border: { color: '#2a2a3a' }
        }
      }
    }
  });
}

// Allow Enter key to predict
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'xInput') predict();
});
</script>
</body>
</html>
