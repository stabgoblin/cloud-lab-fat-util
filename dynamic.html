<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PULSE — Live System</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050508;
      --fg: #e8e4dc;
      --acid: #c8ff00;
      --dim: #2a2a35;
      --mid: #7a7a8a;
      --red: #ff3d5a;
      --blue: #00d4ff;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: 'Space Mono', monospace; }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
    }

    /* GRID BG */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--dim) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
    }

    #app { position: relative; z-index: 1; height: 100vh; display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: 1fr 320px; gap: 0; }

    /* HEADER */
    header {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--dim);
      background: rgba(5,5,8,0.8);
      backdrop-filter: blur(12px);
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; }
    .logo span { color: var(--acid); }
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mid);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--acid);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    .clock { font-size: 0.8rem; color: var(--fg); letter-spacing: 0.05em; }

    /* MAIN CANVAS */
    main {
      grid-row: 2; grid-column: 1;
      padding: 32px;
      display: flex; flex-direction: column; gap: 24px;
      overflow: hidden;
    }

    .section-label {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid);
      margin-bottom: 8px;
    }

    /* WAVEFORM */
    .wave-card {
      border: 1px solid var(--dim);
      padding: 20px;
      position: relative;
      background: rgba(255,255,255,0.01);
    }
    .wave-card::before {
      content: attr(data-label);
      position: absolute; top: -9px; left: 16px;
      font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: var(--bg); padding: 0 8px; color: var(--acid);
    }
    canvas.wave { width: 100%; height: 80px; display: block; }

    /* METRIC ROW */
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .metric {
      border: 1px solid var(--dim);
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .metric:hover { border-color: var(--acid); }
    .metric-val {
      font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
      letter-spacing: -0.04em; line-height: 1;
      transition: color 0.3s;
    }
    .metric-name { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); margin-top: 6px; }
    .metric-bar {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: var(--acid); transition: width 0.8s cubic-bezier(.23,1,.32,1);
    }
    .metric.alert .metric-val { color: var(--red); }
    .metric.alert .metric-bar { background: var(--red); }

    /* EVENT LOG */
    .log-wrap { flex: 1; border: 1px solid var(--dim); padding: 16px; overflow: hidden; position: relative; }
    .log-wrap::before { content: 'EVENT STREAM'; position: absolute; top: -9px; left: 16px; font-size: 0.6rem; letter-spacing: 0.15em; background: var(--bg); padding: 0 8px; color: var(--mid); }
    #log { height: 100%; overflow: hidden; display: flex; flex-direction: column-reverse; gap: 4px; }
    .log-entry {
      font-size: 0.68rem; line-height: 1.5; color: var(--mid);
      animation: slide-in 0.3s ease;
      display: flex; gap: 12px; align-items: baseline;
    }
    .log-entry .ts { color: var(--dim); min-width: 70px; font-size: 0.6rem; }
    .log-entry .tag { min-width: 52px; text-align: center; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 4px; }
    .tag.ok  { background: rgba(200,255,0,0.1); color: var(--acid); }
    .tag.warn { background: rgba(255,180,0,0.1); color: #ffb400; }
    .tag.err { background: rgba(255,61,90,0.12); color: var(--red); }
    .tag.info { background: rgba(0,212,255,0.08); color: var(--blue); }
    @keyframes slide-in { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }

    /* SIDEBAR */
    aside {
      grid-row: 2; grid-column: 2;
      border-left: 1px solid var(--dim);
      padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
      overflow: hidden;
    }

    /* RADIAL GAUGE */
    .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    svg.gauge { overflow: visible; }
    .gauge-val-text { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; text-anchor: middle; dominant-baseline: central; fill: var(--fg); }
    .gauge-label-text { font-size: 0.55rem; letter-spacing: 0.18em; text-anchor: middle; fill: var(--mid); font-family: 'Space Mono', monospace; }

    /* SPARKLINES */
    .spark-list { display: flex; flex-direction: column; gap: 12px; }
    .spark-row { display: flex; align-items: center; gap: 10px; }
    .spark-name { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); min-width: 60px; }
    canvas.spark { flex: 1; height: 28px; }
    .spark-num { font-size: 0.75rem; font-family: 'Syne', sans-serif; font-weight: 700; min-width: 36px; text-align: right; }

    /* FOOTER */
    footer {
      grid-column: 1 / -1;
      border-top: 1px solid var(--dim);
      padding: 10px 32px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim);
    }
    .uptime-counter { color: var(--mid); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">PUL<span>S</span>E</div>
    <div class="status-pill"><div class="dot"></div>System Nominal</div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main>
    <div class="wave-card" data-label="Signal Alpha">
      <canvas class="wave" id="wave1"></canvas>
    </div>
    <div class="metrics" id="metrics">
      <div class="metric" id="m0"><div class="metric-val" id="mv0">—</div><div class="metric-name">Throughput</div><div class="metric-bar" id="mb0"></div></div>
      <div class="metric" id="m1"><div class="metric-val" id="mv1">—</div><div class="metric-name">Latency ms</div><div class="metric-bar" id="mb1"></div></div>
      <div class="metric" id="m2"><div class="metric-val" id="mv2">—</div><div class="metric-name">Error Rate</div><div class="metric-bar" id="mb2"></div></div>
      <div class="metric" id="m3"><div class="metric-val" id="mv3">—</div><div class="metric-name">Active Nodes</div><div class="metric-bar" id="mb3"></div></div>
    </div>
    <div class="log-wrap"><div id="log"></div></div>
  </main>

  <aside>
    <div class="section-label">CPU Load</div>
    <div class="gauge-wrap">
      <svg class="gauge" width="160" height="100" viewBox="0 0 160 100">
        <path d="M 20 90 A 60 60 0 0 1 140 90" fill="none" stroke="#1a1a25" stroke-width="10" stroke-linecap="round"/>
        <path id="gauge-arc" d="M 20 90 A 60 60 0 0 1 140 90" fill="none" stroke="#c8ff00" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        <text class="gauge-val-text" id="gauge-val" x="80" y="80">0%</text>
        <text class="gauge-label-text" x="80" y="96">CPU</text>
      </svg>
    </div>

    <div class="section-label">Subsystems</div>
    <div class="spark-list" id="sparks">
      <div class="spark-row"><span class="spark-name">Memory</span><canvas class="spark" id="sp0"></canvas><span class="spark-num" id="sn0">—</span></div>
      <div class="spark-row"><span class="spark-name">Disk I/O</span><canvas class="spark" id="sp1"></canvas><span class="spark-num" id="sn1">—</span></div>
      <div class="spark-row"><span class="spark-name">Network</span><canvas class="spark" id="sp2"></canvas><span class="spark-num" id="sn2">—</span></div>
      <div class="spark-row"><span class="spark-name">Queue</span><canvas class="spark" id="sp3"></canvas><span class="spark-num" id="sn3">—</span></div>
    </div>
  </aside>

  <footer>
    <span>PULSE MONITOR v2.4.1</span>
    <span class="uptime-counter" id="uptime">Uptime: 00:00:00</span>
    <span>Mumbai · IN</span>
  </footer>
</div>

<script>
  // ── Clock ─────────────────────────────────────────────
  const clockEl = document.getElementById('clock');
  function tickClock() {
    clockEl.textContent = new Date().toLocaleTimeString('en-GB', {hour12: false});
  }
  tickClock(); setInterval(tickClock, 1000);

  // ── Uptime ────────────────────────────────────────────
  const start = Date.now();
  const uptimeEl = document.getElementById('uptime');
  setInterval(() => {
    const s = Math.floor((Date.now() - start) / 1000);
    const h = String(Math.floor(s/3600)).padStart(2,'0');
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    const sec = String(s%60).padStart(2,'0');
    uptimeEl.textContent = `Uptime: ${h}:${m}:${sec}`;
  }, 1000);

  // ── Waveform ──────────────────────────────────────────
  const wc = document.getElementById('wave1');
  const wx = wc.getContext('2d');
  let wt = 0, wData = new Array(300).fill(0);
  function resizeWave() { wc.width = wc.offsetWidth * devicePixelRatio; wc.height = wc.offsetHeight * devicePixelRatio; }
  window.addEventListener('resize', resizeWave); resizeWave();

  function drawWave() {
    wt += 0.04;
    const v = Math.sin(wt * 1.3) * 0.4 + Math.sin(wt * 2.7) * 0.2 + Math.sin(wt * 0.5) * 0.3 + (Math.random() - 0.5) * 0.15;
    wData.push(v); wData.shift();
    const W = wc.width, H = wc.height, mid = H / 2;
    wx.clearRect(0, 0, W, H);
    // fill
    wx.beginPath();
    wx.moveTo(0, mid);
    wData.forEach((d, i) => { wx.lineTo((i / (wData.length - 1)) * W, mid - d * mid * 0.85); });
    wx.lineTo(W, mid); wx.closePath();
    const grad = wx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(200,255,0,0.18)');
    grad.addColorStop(1, 'rgba(200,255,0,0)');
    wx.fillStyle = grad; wx.fill();
    // line
    wx.beginPath();
    wData.forEach((d, i) => { const x = (i / (wData.length - 1)) * W, y = mid - d * mid * 0.85; i===0?wx.moveTo(x,y):wx.lineTo(x,y); });
    wx.strokeStyle = '#c8ff00'; wx.lineWidth = 1.5 * devicePixelRatio; wx.stroke();
  }

  // ── Metrics ───────────────────────────────────────────
  const metricState = [
    { val: 4820, min: 1000, max: 9999, unit: '', suffix: '' },
    { val: 42, min: 10, max: 999, unit: '', suffix: 'ms' },
    { val: 0.3, min: 0, max: 15, unit: '', suffix: '%' },
    { val: 24, min: 10, max: 48, unit: '', suffix: '' },
  ];
  function lerp(a, b, t) { return a + (b - a) * t; }
  function updateMetrics() {
    metricState.forEach((m, i) => {
      m.val = Math.max(m.min, Math.min(m.max, m.val + (Math.random() - 0.48) * (m.max - m.min) * 0.06));
      const pct = (m.val - m.min) / (m.max - m.min) * 100;
      const isAlert = (i === 2 && m.val > 8) || (i === 1 && m.val > 600);
      document.getElementById('mv' + i).textContent = m.suffix === '%' ? m.val.toFixed(1) + '%' : (m.suffix === 'ms' ? Math.round(m.val) + 'ms' : Math.round(m.val).toLocaleString());
      document.getElementById('mb' + i).style.width = pct + '%';
      document.getElementById('m' + i).classList.toggle('alert', isAlert);
    });
  }

  // ── Gauge ─────────────────────────────────────────────
  let cpu = 35;
  const gaugeArc = document.getElementById('gauge-arc');
  const gaugeVal = document.getElementById('gauge-val');
  const ARC_LEN = 188.5;
  function updateGauge() {
    cpu = Math.max(5, Math.min(99, cpu + (Math.random() - 0.47) * 8));
    const offset = ARC_LEN - (cpu / 100) * ARC_LEN;
    gaugeArc.setAttribute('stroke-dashoffset', offset);
    gaugeArc.setAttribute('stroke', cpu > 80 ? '#ff3d5a' : cpu > 60 ? '#ffb400' : '#c8ff00');
    gaugeVal.textContent = Math.round(cpu) + '%';
    gaugeVal.setAttribute('fill', cpu > 80 ? '#ff3d5a' : cpu > 60 ? '#ffb400' : '#e8e4dc');
  }

  // ── Sparklines ────────────────────────────────────────
  const sparkData = [[],[],[],[]];
  const sparkColors = ['#00d4ff','#c8ff00','#ff3d5a','#ffb400'];
  const sparkLabels = ['%','MB/s','Mb/s','k'];
  const sparkBases  = [60, 120, 85, 3200];
  const sparkRanges = [30, 80, 60, 2000];
  sparkData.forEach(d => { for(let i=0;i<30;i++) d.push(Math.random()); });

  function drawSpark(idx) {
    const c = document.getElementById('sp' + idx);
    const cx = c.getContext('2d');
    c.width = c.offsetWidth * devicePixelRatio; c.height = c.offsetHeight * devicePixelRatio;
    const d = sparkData[idx], W = c.width, H = c.height;
    const mn = Math.min(...d), mx = Math.max(...d), range = mx - mn || 1;
    cx.clearRect(0,0,W,H);
    cx.beginPath();
    d.forEach((v,i) => {
      const x = (i/(d.length-1))*W, y = H - ((v - mn)/range)*(H*0.8) - H*0.1;
      i===0 ? cx.moveTo(x,y) : cx.lineTo(x,y);
    });
    cx.strokeStyle = sparkColors[idx]; cx.lineWidth = 1.5*devicePixelRatio; cx.stroke();
    // last value label
    const last = d[d.length-1];
    const realVal = sparkBases[idx] + last * sparkRanges[idx];
    document.getElementById('sn'+idx).textContent = realVal < 1000 ? realVal.toFixed(0) + sparkLabels[idx] : (realVal/1000).toFixed(1)+'k';
  }

  function updateSparks() {
    sparkData.forEach((d,i) => {
      d.push(Math.max(0, Math.min(1, d[d.length-1] + (Math.random()-0.48)*0.15)));
      d.shift();
      drawSpark(i);
    });
  }

  // ── Event Log ─────────────────────────────────────────
  const logEl = document.getElementById('log');
  const LOG_EVENTS = [
    ['ok','AUTH','User session established'],
    ['ok','SYS','Health check passed — all services responding'],
    ['info','NET','Connection pool resized to 128'],
    ['info','CACHE','LRU evicted 2.4k entries'],
    ['warn','DB','Query took 340ms — threshold 200ms'],
    ['warn','MEM','RSS approaching soft limit (82%)'],
    ['ok','JOB','Batch job completed in 1.2s'],
    ['err','API','Upstream timeout — retry 1/3'],
    ['ok','API','Upstream retry succeeded'],
    ['info','SCHED','Cron task triggered: rotate-logs'],
    ['ok','AUTH','Token refreshed successfully'],
    ['warn','NET','Packet loss 0.4% on eth1'],
    ['info','SYS','GC pause 18ms'],
    ['err','IO','Disk flush delayed 220ms'],
    ['ok','SYS','Self-heal routine completed'],
  ];

  function addLog() {
    const [type, tag, msg] = LOG_EVENTS[Math.floor(Math.random()*LOG_EVENTS.length)];
    const ts = new Date().toLocaleTimeString('en-GB',{hour12:false});
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="ts">${ts}</span><span class="tag ${type}">${tag}</span><span>${msg}</span>`;
    logEl.prepend(entry);
    while(logEl.children.length > 40) logEl.removeChild(logEl.lastChild);
  }

  // ── Animation Loop ────────────────────────────────────
  let frame = 0;
  function loop() {
    drawWave();
    frame++;
    if (frame % 30 === 0) { updateMetrics(); updateGauge(); updateSparks(); }
    if (frame % 90 === 0) addLog();
    requestAnimationFrame(loop);
  }

  // Initial fills
  updateMetrics(); updateGauge(); updateSparks(); addLog(); addLog(); addLog();
  loop();
</script>
</body>
</html>
